services:
  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.template.yaml:ro
      - ./litellm/generate_config.py:/app/generate_config.py:ro
      - ./litellm/custom_callbacks.py:/app/custom_callbacks.py:ro
      - ./litellm/entrypoint.sh:/app/entrypoint.sh:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgresql:5432/${LITELLM_DB_NAME:-litellm}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:${LANGFUSE_PORT:-3000}
      REDIS_HOST: redis
      REDIS_PORT: "${REDIS_PORT:-6379}"
      STORE_MODEL_IN_DB: "True"
    entrypoint: ["sh", "/app/entrypoint.sh"]
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgresql:5432/${LANGFUSE_DB_NAME:-langfuse}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
    depends_on:
      postgresql:
        condition: service_healthy

  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_API_PORT:-8000}:8000"
    volumes:
      - ./gateway-api/provider_models.yaml:/app/provider_models.yaml:ro
    environment:
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_CLIENT_TIMEOUT: ${LITELLM_CLIENT_TIMEOUT:-30}
      GATEWAY_API_SECRET: ${GATEWAY_API_SECRET}
      GATEWAY_API_PORT: ${GATEWAY_API_PORT:-8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgresql:5432/${GATEWAY_DB_NAME:-gateway}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      AUDIT_HISTORY_DEFAULT_LIMIT: ${AUDIT_HISTORY_DEFAULT_LIMIT:-100}
      PROVIDER_MODELS_PATH: /app/provider_models.yaml
      LANGFUSE_HOST: http://langfuse:${LANGFUSE_PORT:-3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    depends_on:
      postgresql:
        condition: service_healthy
      litellm-proxy:
        condition: service_started
      langfuse:
        condition: service_started

volumes:
  pgdata:
  redisdata:
